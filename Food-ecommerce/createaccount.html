<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <title>Login</title>
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(45deg,#1e3c72,#2a5298);
      font-family:system-ui,Segoe UI,Arial;
    }
    .login-box{
      background:#fff;
      width:90%;
      max-width:360px;
      padding:24px;
      border-radius:10px;
      box-shadow:0 12px 35px rgba(0,0,0,.25);
    }
    .login-box h2{
      text-align:center;
      margin-bottom:20px;
    }
    label{
      font-size:14px;
      display:block;
      margin-bottom:4px;
    }
    input{
      width:100%;
      padding:8px 10px;
      margin-bottom:14px;
      border-radius:4px;
      border:1px solid #ccc;
    }
    button{
      width:100%;
      height:38px;
      border:none;
      border-radius:4px;
      background:#2a5298;
      color:#fff;
      font-size:15px;
      cursor:pointer;
    }
    .links{
      margin-top:12px;
      display:flex;
      justify-content:space-between;
      font-size:13px;
      flex-direction:column;
      align-items:center;
      width:190px;
    }
    .links a{
      text-decoration:none;
      color:#4a4b4c;
      
    }
    @media(max-width:360px){
      .login-box{padding:18px}
      button{font-size:14px}
    }
    .facebook{
      margin-top:12px;
      display:flex;
      justify-content:space-between;
      font-size:13px;
      flex-direction:row;
      align-items:center;
      background-color:#ccc;
      /* width:190px;
      height:20px; */
    }
    .google{
       margin-top:12px;
      display:flex;
      justify-content:space-between;
      font-size:13px;
      flex-direction:row;
      align-items:center;
      background-color:#ccc;
      /* width:190px;
      height:20px; */
    }
  </style>
</head>
<body>
    
  <div class="login-box">
    <h2 style="font-weight: lighter;font-size:24px;">Create account</h2>
    <form id="myuser">
      <label>First Name</label>
      <input type="text" placeholder="Enter first name" id="f-name" required>
      <label>Last Name</label>
      <input type="text" placeholder="Enter last name"id="l-name" required>
      <label>Create password</label>
      <input type="password" placeholder="Create password" id="p-cr" required>
      <label>Comfirm password</label>
      <input type="password" placeholder="Comfirm password" id="p-co" required>
      <button id="submitBtn">Create Account</button>
    </form>
    <div class="links">
      <div class="facebook">
     <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-facebook" viewBox="0 0 16 16" style="color:rgb(42, 42, 245)">
  <path d="M16 8.049c0-4.446-3.582-8.05-8-8.05C3.58 0-.002 3.603-.002 8.05c0 4.017 2.926 7.347 6.75 7.951v-5.625h-2.03V8.05H6.75V6.275c0-2.017 1.195-3.131 3.022-3.131.876 0 1.791.157 1.791.157v1.98h-1.009c-.993 0-1.303.621-1.303 1.258v1.51h2.218l-.354 2.326H9.25V16c3.824-.604 6.75-3.934 6.75-7.951"/>
</svg></i> <a href="#">Sign in with Facebook</a>
</div>
<div class="google">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-google" viewBox="0 0 16 16" style="color:rgb(246, 35, 35)">
  <path d="M15.545 6.558a9.4 9.4 0 0 1 .139 1.626c0 2.434-.87 4.492-2.384 5.885h.002C11.978 15.292 10.158 16 8 16A8 8 0 1 1 8 0a7.7 7.7 0 0 1 5.352 2.082l-2.284 2.284A4.35 4.35 0 0 0 8 3.166c-2.087 0-3.86 1.408-4.492 3.304a4.8 4.8 0 0 0 0 3.063h.003c.635 1.893 2.405 3.301 4.492 3.301 1.078 0 2.004-.276 2.722-.764h-.003a3.7 3.7 0 0 0 1.599-2.431H8v-3.08z"/>
</svg><a href="#">Sign in with Google</a>
</div>
    </div>
  </div>
  <script src="FoodinJapan.js"></script>
</body>
</html>
