<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <title>Food2You Japan</title>
</head>

<body class="bg-light">

<!-- 🔹 NAVBAR -->
<nav class="navbar navbar-expand-lg bg-white shadow-sm">
  <div class="container">
    <h2 class="fw-bold">Food<span class="text-primary">2You</span></h2>

    <button class="btn btn-primary" id="signUp">
      Sign in / Sign up
    </button>
  </div>
</nav>

<!-- 🔹 HERO SECTION -->
<section class="text-center py-5 bg-white">
  <div class="container">
    <h1 class="fw-bold mb-3">
      🍣 Fast Delivery Across <span class="text-primary">Japan</span>
    </h1>
    <p class="text-muted">
      Order your favorite food anytime, anywhere in Japan.
    </p>
  </div>
</section>

<!-- 🔹 IMAGE SECTION -->
<section class="container py-4">
  <div class="row text-center">
    
    <div class="col-md-6 mb-3">
      <img src="https://tse3.mm.bing.net/th/id/OIP.YzX6TVGN4AUIS9j1XEuORQHaIh?pid=ImgDetMain"
           class="img-fluid rounded shadow">
      <p class="mt-2">Delivery Coverage Map</p>
    </div>

    <div class="col-md-6 mb-3">
      <img src="https://static.vecteezy.com/system/resources/previews/002/553/721/original/fast-cardboard-box-cargo-shipping-related-delivery-line-style-icon-free-vector.jpg"
           class="img-fluid rounded shadow">
      <p class="mt-2">Fast Delivery Service</p>
    </div>

  </div>
</section>

<!-- 🔹 ADDRESS CARD -->
<section class="container pb-5">
  <div class="card shadow p-4">
    
    <h4 class="mb-3">📍 Delivery Address</h4>

    <p class="mb-1"><strong>Street:</strong> 433-1262, Shinonomemachi</p>
    <p class="mb-1"><strong>City:</strong> Hakata-ku, Fukuoka</p>
    <p class="mb-1"><strong>Phone:</strong> +81 88-172-7526</p>
    <p class="mb-3"><strong>Country:</strong> Japan</p>

    <button class="btn btn-success w-100" id="ndbtn">
      Start Ordering 🚀
    </button>

  </div>
</section>

<!-- 🔹 SCRIPT -->
<script>
document.getElementById('signUp').addEventListener('click', e => {
    e.preventDefault();
    window.location.href = 'createaccount.html';
});

window.onload = () => {
    const user = sessionStorage.getItem('username');
    if (user) {
        window.location.href = 'usercreatedacc.html';
    }
};
</script>

</body>
</html>
